  <script>
  (function () {
    var overlay = document.createElement('div');
    Object.assign(overlay.style, {
      display: 'none', position: 'fixed', inset: '0', zIndex: '9999',
      background: '#fff', alignItems: 'center', justifyContent: 'center', cursor: 'zoom-out'
    });
    var img = document.createElement('img');
    Object.assign(img.style, {
      maxWidth: '90vw', maxHeight: '90vh', objectFit: 'contain', display: 'block', cursor: 'default'
    });
    overlay.appendChild(img);
    document.body.appendChild(overlay);
    var scrollY = 0;
    function open(src) {
      scrollY = window.scrollY;
      img.src = src;
      overlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }
    function close() {
      overlay.style.display = 'none';
      img.src = '';
      document.body.style.overflow = '';
      window.scrollTo(0, scrollY);
    }
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });
    document.querySelectorAll('.g img').forEach(function(el) {
      el.style.cursor = 'zoom-in';
      el.addEventListener('click', function(e) { e.stopPropagation(); open(el.src); });
    });
  })();
  </script>
